<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérification de dossier - C-Emploi</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  color:white;

  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
              url('https://images.unsplash.com/photo-1521791136064-7986c2920216');
  background-size: cover;
  background-position: center;
}

.container {
  max-width:600px;
  margin:auto;
  padding:40px 20px;
}

.logo {
  width:90px;
}

/* CARD */
.card {
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  position:relative;
}

/* TAMPON */
.stamp {
  position:absolute;
  top:20px;
  right:20px;
  font-size:20px;
  padding:10px;
  border:3px solid red;
  color:red;
  transform:rotate(-20deg);
  font-weight:bold;
  opacity:0.8;
}

/* BADGE */
.badge {
  display:inline-block;
  padding:8px 15px;
  border-radius:20px;
  color:white;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform:scale(1);}
  50% {transform:scale(1.1);}
  100% {transform:scale(1);}
}

button {
  padding:12px;
  background:#ff7a00;
  border:none;
  border-radius:8px;
  color:white;
}

input {
  padding:12px;
  width:70%;
  border-radius:8px;
  border:none;
}

.whatsapp {
  margin-top:15px;
  display:inline-block;
  background:#25D366;
  padding:10px 20px;
  border-radius:8px;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<img src="TON_LOGO.png" class="logo">

<h2>🔎 Vérification de dossier</h2>

<input id="id" placeholder="Entrer votre ID">
<button onclick="rechercher()">Rechercher</button>

<div id="result"></div>

</div>

<script>
function rechercher(){

let id=document.getElementById("id").value.trim();
let resultDiv=document.getElementById("result");

resultDiv.innerHTML="⏳ Chargement...";

fetch("https://opensheet.elk.sh/1IHlqsby69hHzrbp5Ed-5BCH3AbDi4mliD4kmB7BB5bA/API")
.then(res=>res.json())
.then(data=>{

let r=data.find(d=>d["Submission ID"]==id);

if(!r){
resultDiv.innerHTML="❌ Aucun dossier";
return;
}

let statut=r["Statut"]||"En attente";
let couleur="gray";
let stamp="EN COURS";

if(statut.toLowerCase()=="valide"){
couleur="green";
stamp="VALIDÉ";
}
if(statut.toLowerCase()=="refusé"){
couleur="red";
stamp="REFUSÉ";
}

resultDiv.innerHTML=`
<div class="card">

<div class="stamp">${stamp}</div>

<h3>Dossier candidat</h3>

<p><b>ID:</b> ${r["Submission ID"]}</p>
<p><b>Nom:</b> ${r["Nom"]}</p>
<p><b>Prénom:</b> ${r["Prénom"]}</p>

<p><b>Statut:</b>
<span class="badge" style="background:${couleur}">
${statut}
</span>
</p>

<a class="whatsapp" href="https://wa.me/16134169403?text=Bonjour%20je%20veux%20vérifier%20mon%20dossier%20ID:${id}">
Contacter WhatsApp
</a>

</div>
`;

});
}
</script>

</body>
</html>
