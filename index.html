<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérification de dossier - C-Emploi</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  color:white;

  /* FOND STYLE INSTITUTION CANADA */
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
  url('https://images.unsplash.com/photo-1507679799987-c73779587ccf');
  background-size: cover;
  background-position: center;
}

.container {
  max-width:600px;
  margin:auto;
  padding:40px 20px;
}

/* DRAPEAU CANADA */
.flag {
  width:60px;
  margin-bottom:10px;
}

/* CARD */
.card {
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  position:relative;
  text-align:left;
}

/* TAMPON */
.stamp {
  position:absolute;
  top:20px;
  right:20px;
  font-size:18px;
  padding:8px;
  border:3px solid red;
  color:red;
  transform:rotate(-20deg);
  font-weight:bold;
}

/* BADGE */
.badge {
  display:inline-block;
  padding:6px 12px;
  border-radius:20px;
  color:white;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform:scale(1);}
  50% {transform:scale(1.1);}
  100% {transform:scale(1);}
}

button {
  padding:12px;
  background:#d32f2f;
  border:none;
  border-radius:8px;
  color:white;
}

input {
  padding:12px;
  width:70%;
  border-radius:8px;
  border:none;
}

/* SIGNATURE */
.footer {
  margin-top:40px;
  font-size:13px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<!-- 🇨🇦 DRAPEAU CANADA -->
<img src="https://flagcdn.com/w80/ca.png" class="flag">

<h2>🔎 Vérification officielle de dossier</h2>
<p>Système sécurisé - Service d’emploi Canada</p>

<input id="id" placeholder="Entrer votre ID">
<button onclick="rechercher()">Rechercher</button>

<div id="result"></div>

<div class="footer">
✍️ Emploi Canada — Système de vérification officiel
</div>

</div>

<script>
function rechercher(){

let id=document.getElementById("id").value.trim();
let resultDiv=document.getElementById("result");

if(!id){
resultDiv.innerHTML="⚠️ Entrez un ID";
return;
}

resultDiv.innerHTML="⏳ Vérification en cours...";

fetch("https://opensheet.elk.sh/1IHlqsby69hHzrbp5Ed-5BCH3AbDi4mliD4kmB7BB5bA/API")
.then(res=>res.json())
.then(data=>{

let r=data.find(d=>(d["Submission ID"]||"").toLowerCase()==id.toLowerCase());

if(!r){
resultDiv.innerHTML="❌ Aucun dossier trouvé";
return;
}

let statut=(r["Statut"]||"En attente");
let couleur="gray";
let stamp="EN COURS";

if(statut.toLowerCase()=="valide"){
couleur="green";
stamp="VALIDÉ";
}
if(statut.toLowerCase()=="refusé"){
couleur="red";
stamp="REFUSÉ";
}

/* DATE */
let date="Non disponible";
if(r["Submitted at"]){
let d=new Date(r["Submitted at"]);
if(!isNaN(d)) date=d.toLocaleString("fr-FR");
}

resultDiv.innerHTML=`
<div class="card">

<div class="stamp">${stamp}</div>

<h3>Dossier candidat</h3>

<p><b>ID:</b> ${r["Submission ID"]}</p>
<p><b>Date:</b> ${date}</p>
<p><b>Nom:</b> ${r["Nom"]}</p>
<p><b>Prénom:</b> ${r["Prénom"]}</p>
<p><b>Nationalité:</b> ${r["Nationalité"]}</p>
<p><b>Poste:</b> ${r["Poste souhaité"]}</p>

<p><b>Statut:</b>
<span class="badge" style="background:${couleur}">
${statut}
</span>
</p>

<p><b>Commentaire:</b> ${r["Commentaire"]||"Aucun"}</p>

</div>
`;

})
.catch(()=>{
resultDiv.innerHTML="❌ Erreur serveur";
});

}
</script>

</body>
</html>
