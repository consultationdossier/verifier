<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vérification de dossier</title>
</head>

<body style="font-family:Arial; background:#f06d06; color:white; text-align:center; padding:40px;">

<h2>🔎 Vérification de dossier</h2>

<input type="text" id="id" placeholder="Entrer votre ID" style="padding:10px; width:250px;">
<button onclick="rechercher()" style="padding:10px;">Rechercher</button>

<div id="result" style="margin-top:30px;"></div>

<script>
function rechercher() {

  var id = document.getElementById("id").value.trim();

  if (!id) {
    document.getElementById("result").innerHTML = "⚠️ Veuillez entrer un ID";
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Recherche...";

  fetch("https://opensheet.elk.sh/1IHlqsby69hHzrbp5Ed-5BCH3AbDi4mliD4kmB7BB5bA/API")
    .then(function(res){ return res.json(); })
    .then(function(data){

      var trouve = false;
      var html = "";

      data.forEach(function(d){

        if ((d["Submission ID"] || "").trim() === id) {
          trouve = true;

          html += "<div style='background:white;color:black;padding:15px;margin:20px auto;width:300px;border-radius:10px;text-align:left'>";
          html += "<b>ID :</b> " + (d["Submission ID"] || "") + "<br>";
          html += "<b>Date de soumission :</b> " + (d["Submitted at"] || "") + "<br>";
          html += "<b>Prénom :</b> " + (d["Prénom"] || "") + "<br>";
          html += "<b>Nom :</b> " + (d["Nom"] || "") + "<br>";
          html += "<b>Date de naissance :</b> " + (d["Date de naissance"] || "") + "<br>";
          html += "<b>Nationalité :</b> " + (d["Nationalité"] || "") + "<br>";
          html += "<b>Poste :</b> " + (d["Poste souhaité"] || "") + "<br>";
          html += "<b>Statut :</b> " + (d["Statut"] || "En attente") + "<br>";
          html += "<b>Commentaire :</b> " + (d["Commentaire"] || "Aucun") + "<br>";
          html += "</div>";
        }

      });

      if (!trouve) {
        document.getElementById("result").innerHTML = "❌ Aucun dossier trouvé";
      } else {
        document.getElementById("result").innerHTML = "✅ Dossier trouvé" + html;
      }

    })
    .catch(function(){
      document.getElementById("result").innerHTML = "❌ Erreur de connexion";
    });

}
</script>

</body>
</html>
