<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vérification de dossier</title>

<style>
body {
  font-family: Arial;
  background: #f06d06;
  text-align: center;
  padding: 40px;
  color: white;
}

input {
  padding: 12px;
  width: 250px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 12px 20px;
  background: black;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-left: 10px;
}

button:hover {
  background: #333;
}

.card {
  background: #fff;
  padding: 20px;
  margin: 20px auto;
  width: 340px;
  border-radius: 12px;
  color: #000;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h2>🔎 Vérification de dossier</h2>

<input type="text" id="id" placeholder="Entrer votre ID">
<button onclick="rechercher()">Rechercher</button>

<div id="result"></div>

<script>
function rechercher() {

  let id = document.getElementById("id").value.trim();
  let resultDiv = document.getElementById("result");

  if (!id) {
    resultDiv.innerHTML = "⚠️ Veuillez entrer un ID";
    return;
  }

  resultDiv.innerHTML = "⏳ Recherche en cours...";

  fetch("https://opensheet.elk.sh/1IHlqsby69hHzrbp5Ed-5BCH3AbDi4mliD4kmB7BB5bA/API")
    .then(res => {
      if (!res.ok) throw new Error("Erreur serveur");
      return res.json();
    })
    .then(data => {

      if (!Array.isArray(data)) {
        throw new Error("Format invalide");
      }

      let resultats = data.filter(row => 
        (row["Submission ID"] || "").toLowerCase().trim() === id.toLowerCase()
      );

      if (resultats.length === 0) {
        resultDiv.innerHTML = "❌ Aucun dossier trouvé";
        return;
      }

      let html = "";

      resultats.forEach(d => {

        let statut = (d["Statut"] || "").toLowerCase();
        let statutCouleur = "gray";
        let statutTexte = d["Statut"] || "En attente";

        if (statut === "valide") statutCouleur = "green";
        else if (statut === "en cours") statutCouleur = "orange";

        let dateSoumission = "Non disponible";
        if (d["Submitted at"]) {
          let dateObj = new Date(d["Submitted at"]);
          if (!isNaN(dateObj)) {
            dateSoumission = dateObj.toLocaleString("fr-FR");
          }
        }

        html += `
          <div class="card">
            <h3>📄 Dossier candidat</h3>

            <p><b>ID :</b> ${d["Submission ID"] || "-"}</p>
            <p><b>Date de soumission :</b> ${dateSoumission}</p>
            <p><b>Prénom :</b> ${d["Prénom"] || "-"}</p>
            <p><b>Nom :</b> ${d["Nom"] || "-"}</p>
            <p><b>Date de naissance :</b> ${d["Date de naissance"] || "-"}</p>
            <p><b>Nationalité :</b> ${d["Nationalité"] || "-"}</p>
            <p><b>Poste :</b> ${d["Poste souhaité"] || "-"}</p>

            <p>
              <b>Statut :</b> 
              <span style="
                background:${statutCouleur};
                color:white;
                padding:5px 10px;
                border-radius:6px;
              ">
                ${statutTexte}
              </span>
            </p>

            <p><b>Commentaire :</b> ${d["Commentaire"] || "Aucun"}</p>

          </div>
        `;
      });

      resultDiv.innerHTML = "✅ Dossier trouvé<br>" + html;

    })
    .catch(error => {
      resultDiv.innerHTML = `
        ❌ Impossible de charger les données<br>
        Vérifiez votre connexion internet.
      `;
      console.error(error);
    });
}
</script>

</body>
</html>
