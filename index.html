<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérification de dossier - C-Emploi</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  color:white;

  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
              url('https://images.unsplash.com/photo-1521790797524-b2497295b8a0');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.container {
  max-width:600px;
  margin:auto;
  padding:40px 20px;
}

/* LOGO */
.logo {
  width:90px;
  margin-bottom:10px;
}

/* DRAPEAUX */
.flags {
  margin:10px 0;
}

.flags img {
  width:40px;
  margin:5px;
  border-radius:5px;
}

/* INPUT */
input {
  padding:12px;
  width:70%;
  border-radius:8px;
  border:none;
}

/* BUTTON */
button {
  padding:12px 20px;
  background:#ff7a00;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover {
  background:#e56700;
}

/* CARD RESULT */
.card {
  background:rgba(255,255,255,0.95);
  padding:20px;
  margin-top:20px;
  border-radius:12px;
  color:black;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
  text-align:left;
}

/* STATUS */
.status {
  padding:6px 12px;
  border-radius:6px;
  color:white;
  font-weight:bold;
}

.footer {
  margin-top:40px;
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="TON_LOGO.png" class="logo">

  <h2>🔎 Vérification de dossier</h2>

  <!-- DRAPEAUX -->
  <div class="flags">
    <img src="https://flagcdn.com/w40/tg.png">
    <img src="https://flagcdn.com/w40/bj.png">
    <img src="https://flagcdn.com/w40/ci.png">
    <img src="https://flagcdn.com/w40/ca.png">
  </div>

  <p>Plateforme officielle de vérification des candidatures</p>

  <input type="text" id="id" placeholder="Entrer votre ID">
  <button onclick="rechercher()">Rechercher</button>

  <div id="result"></div>

  <div class="footer">
    © C-Emploi — Plateforme sécurisée
  </div>

</div>

<script>
function rechercher() {

  let id = document.getElementById("id").value.trim();
  let resultDiv = document.getElementById("result");

  if (!id) {
    resultDiv.innerHTML = "⚠️ Veuillez entrer un ID";
    return;
  }

  resultDiv.innerHTML = "⏳ Recherche en cours...";

  fetch("https://opensheet.elk.sh/1IHlqsby69hHzrbp5Ed-5BCH3AbDi4mliD4kmB7BB5bA/API")
    .then(res => res.json())
    .then(data => {

      let result = data.find(row => 
        (row["Submission ID"] || "").toLowerCase().trim() === id.toLowerCase()
      );

      if (!result) {
        resultDiv.innerHTML = "❌ Aucun dossier trouvé";
        return;
      }

      let statut = (result["Statut"] || "").toLowerCase();
      let couleur = "gray";

      if (statut === "valide") couleur = "green";
      else if (statut === "en cours") couleur = "orange";
      else if (statut === "refusé") couleur = "red";

      let date = "Non disponible";
      if (result["Submitted at"]) {
        let d = new Date(result["Submitted at"]);
        if (!isNaN(d)) date = d.toLocaleString("fr-FR");
      }

      resultDiv.innerHTML = `
        <div class="card">
          <h3>📄 Dossier candidat</h3>

          <p><b>ID :</b> ${result["Submission ID"]}</p>
          <p><b>Date :</b> ${date}</p>
          <p><b>Nom :</b> ${result["Nom"]}</p>
          <p><b>Prénom :</b> ${result["Prénom"]}</p>
          <p><b>Poste :</b> ${result["Poste souhaité"]}</p>

          <p><b>Statut :</b>
            <span class="status" style="background:${couleur}">
              ${result["Statut"] || "En attente"}
            </span>
          </p>

          <p><b>Commentaire :</b> ${result["Commentaire"] || "Aucun"}</p>
        </div>
      `;

    })
    .catch(() => {
      resultDiv.innerHTML = "❌ Erreur de connexion au serveur";
    });
}
</script>

</body>
</html>
