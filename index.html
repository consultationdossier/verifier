<script>
function rechercher() {

  let id = document.getElementById("id").value.trim();

  if (!id) {
    document.getElementById("result").innerHTML = "⚠️ Veuillez entrer un ID";
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Recherche en cours...";

  fetch("https://opensheet.elk.sh/1IHlqsby69hHzrbp5Ed-5BCH3AbDi4mliD4kmB7BB5bA/API")
    .then(res => res.json())
    .then(data => {

      let resultats = data.filter(row => 
        (row["Submission ID"] || "").trim() === id
      );

      if (resultats.length === 0) {
        document.getElementById("result").innerHTML = "❌ Aucun dossier trouvé";
        return;
      }

      let html = "";

      resultats.forEach(d => {
        html += `
          <div style="background:#fff; padding:15px; margin:10px auto; width:320px; border-radius:10px; color:black;">
            <b>ID :</b> ${d["Submission ID"]} <br>
            <b>Date de soumission :</b> ${d["Submitted at"] || ""} <br>
            <b>Prénom :</b> ${d["Prénom"] || ""} <br>
            <b>Nom :</b> ${d["Nom"] || ""} <br>
            <b>Date de naissance :</b> ${d["Date de naissance"] || ""} <br>
            <b>Nationalité :</b> ${d["Nationalité"] || ""} <br>
            <b>Poste :</b> ${d["Poste souhaité"] || ""} <br>
            <b>Statut :</b> ${d["Statut"] || "En attente"} <br>
            <b>Commentaire :</b> ${d["Commentaire"] || "Aucun"}
          </div>
        `;
      });

      document.getElementById("result").innerHTML = "✅ Dossier trouvé<br>" + html;

    })
    .catch(error => {
      document.getElementById("result").innerHTML = "❌ Erreur de connexion";
    });
}
</script>
