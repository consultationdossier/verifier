<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérification officielle - Emploi Canada</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  color:white;
  overflow-x:hidden;

  /* ✅ IMAGE UNIQUE */
  background:url('images/immigration.jpg') no-repeat center center fixed;
  background-size:cover;
}

/* overlay sombre */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.container {
  max-width:600px;
  margin:auto;
  padding:40px 20px;
}

/* 🇨🇦 */
.flag {
  width:60px;
  margin-bottom:10px;
}

/* CARD */
.card {
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  position:relative;
  text-align:left;
}

/* 🔴 tampon */
.stamp {
  position:absolute;
  top:20px;
  right:20px;
  font-size:18px;
  padding:8px;
  border:3px solid red;
  color:red;
  transform:rotate(-20deg);
  font-weight:bold;
}

/* 🎨 badges */
.badge {
  padding:6px 12px;
  border-radius:20px;
  color:white;
  font-weight:bold;
}

.en-attente {background:gray;}
.en-cours {background:orange;}
.valide {background:green;}
.refuse {background:red;}

input {
  padding:12px;
  width:70%;
  border-radius:8px;
  border:none;
}

button {
  padding:12px;
  background:#d32f2f;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.footer {
  margin-top:40px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<img src="https://flagcdn.com/w80/ca.png" class="flag">

<h2>🔎 Vérification officielle de dossier</h2>
<p>Système sécurisé — Service d’emploi Canada</p>

<input id="id" placeholder="Entrer votre ID">
<button onclick="rechercher()">Rechercher</button>

<div id="result"></div>

<div class="footer">
✍️ Emploi Canada — Système de vérification officiel
</div>

</div>

<script>
function rechercher(){

let id=document.getElementById("id").value.trim();
let resultDiv=document.getElementById("result");

if(!id){
resultDiv.innerHTML="⚠️ Entrez un ID";
return;
}

resultDiv.innerHTML="⏳ Vérification en cours...";

fetch("https://opensheet.elk.sh/1IHlqsby69hHzrbp5Ed-5BCH3AbDi4mliD4kmB7BB5bA/API")
.then(res=>res.json())
.then(data=>{

let r=data.find(d=>(d["Submission ID"]||"").toLowerCase()==id.toLowerCase());

if(!r){
resultDiv.innerHTML="❌ Aucun dossier trouvé";
return;
}

let statut=(r["Statut"]||"en attente").toLowerCase();
let classe="en-attente";
let stamp="EN ATTENTE";

if(statut=="en cours"){classe="en-cours"; stamp="EN COURS";}
if(statut=="valide"){classe="valide"; stamp="VALIDÉ";}
if(statut=="refusé"){classe="refuse"; stamp="REFUSÉ";}

let date="Non disponible";
if(r["Submitted at"]){
let d=new Date(r["Submitted at"]);
if(!isNaN(d)) date=d.toLocaleString("fr-FR");
}

resultDiv.innerHTML=`
<div class="card">

<div class="stamp">${stamp}</div>

<h3>Dossier candidat</h3>

<p><b>ID:</b> ${r["Submission ID"]}</p>
<p><b>Date:</b> ${date}</p>
<p><b>Nom:</b> ${r["Nom"]}</p>
<p><b>Prénom:</b> ${r["Prénom"]}</p>
<p><b>Nationalité:</b> ${r["Nationalité"]}</p>
<p><b>Poste:</b> ${r["Poste souhaité"]}</p>

<p><b>Statut:</b>
<span class="badge ${classe}">
${r["Statut"]}
</span>
</p>

<p><b>Commentaire:</b> ${r["Commentaire"]||"Aucun"}</p>

</div>
`;

})
.catch(()=>{
resultDiv.innerHTML="❌ Erreur serveur";
});
}
</script>

</body>
</html>
